<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      p {
        font-size: 24px;
        color: #333;
      }
      p span {
        color: #ff6b4a;
        font-weight: bold;
        display: block;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>writer effect</title>
  </head>
  <body>
    <p>يا محمد احذر ماذا،                         قوم ادرسسسسسسسسسسسسسسسسسسس</p>
    
    <script>
      const p = document.querySelector("p");
      const text = p.textContent;
      p.textContent = "";
      let index = 0;

      function typeWriter() {
        if (index < text.length) {
          p.textContent += text.charAt(index);
          index++;
          setTimeout(typeWriter, 100); // Adjust typing speed here
        }
      }

      typeWriter();
    </script>
  </body>
</html>
